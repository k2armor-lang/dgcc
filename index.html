    /* ===================== (2) 게임 화면 — 판단 근거 필수 ===================== */
    function GameScreen({ player, onFinish }) {

      const [used, setUsed] = useState({});
      const [loading, setLoading] = useState({});

        timers.current.push(t);

      function advance() {

        const go = () => { setIndex((i) => i + 1); setUsed({}); setLoading({}); setOpenCards({}); setDecided(false); setFloaters([]); setBasis(""); window.scrollTo(0, 0); if (!reduceMotion) requestAnimationFrame(() => requestAnimationFrame(() => setFade(true))); };

                      </button>); })}
                  </div>
                  {TOOLKITS.some((t) => used[t.key]) && (<div className="mt-4 pt-4 border-t border-[#1F2A37] space-y-2.5"><div className="font-mono text-[11px] tracking-wider text-[#8B98A5]">분석 결과</div>{TOOLKITS.filter((t) => used[t.key]).map((tk) => (<ToolkitResultCard key={tk.key} tk={tk} result={stage.toolkit[tk.key]} open={!!openCards[tk.key]} onToggle={() => setOpenCards((o) => ({ ...o, [tk.key]: !o[tk.key] }))} />))}</div>)}
                </div>
                {/* 판단 근거 (필수) + 판별 */}
                <div className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-4 sm:p-5">
                  <div className="flex items-center gap-2 mb-1"><IconEdit className="w-5 h-5 text-[#22D3EE]" /><h3 className="text-[15px] font-semibold text-[#E6EDF3]">판단 근거 <span className="text-[#F87171]">*</span></h3></div>
                  <p className="text-[13px] text-[#8B98A5] mb-2">이 콘텐츠를 왜 그렇게 판단했는지 근거를 적으세요. (모둠 토의 후 작성)</p>
                  <textarea value={basis} onChange={(e) => setBasis(e.target.value)} rows={3} disabled={decided} placeholder="예: 툴킷으로 원본 영상을 찾았고, 공식 계정에 이 발언이 없어서…" className="w-full rounded-xl border border-[#1F2A37] bg-[#0A0E14] px-3.5 py-3 text-[16px] leading-relaxed text-[#E6EDF3] placeholder:text-[#8B98A5]/60 outline-none focus:border-[#22D3EE] transition-colors resize-none disabled:opacity-60" />
                  <p className={"mt-1.5 text-[12px] font-mono " + (basisOk ? "text-[#34D399]" : "text-[#8B98A5]")}>{basisOk ? "작성 완료 · 판별할 수 있습니다" : `근거를 ${RULES.BASIS_MIN}자 이상 적어야 판별할 수 있습니다 (현재 ${basisLen}자)`}</p>

                  <h3 className="mt-4 text-[15px] font-semibold text-[#E6EDF3] mb-1">최종 판별</h3>
                  <p className="text-[13px] text-[#8B98A5] mb-3">이 콘텐츠는 진실입니까, 거짓입니까?</p>
                  <div className="grid grid-cols-2 gap-3">
                    <button onClick={() => verdict("REAL")} disabled={decided || !basisOk} className="group inline-flex flex-col items-center justify-center gap-1 rounded-xl border-2 border-[#34D399]/50 bg-[#34D399]/5 py-4 text-[#34D399] hover:bg-[#34D399] hover:text-[#0A0E14] transition-colors disabled:opacity-40 disabled:pointer-events-none"><IconCheck className="w-7 h-7" /><span className="text-[16px] font-bold">REAL</span><span className="text-[12px] font-medium opacity-90">진실</span></button>
                    <button onClick={() => verdict("FAKE")} disabled={decided || !basisOk} className="group inline-flex flex-col items-center justify-center gap-1 rounded-xl border-2 border-[#F87171]/50 bg-[#F87171]/5 py-4 text-[#F87171] hover:bg-[#F87171] hover:text-[#0A0E14] transition-colors disabled:opacity-40 disabled:pointer-events-none"><IconAlert className="w-7 h-7" /><span className="text-[16px] font-bold">FAKE</span><span className="text-[12px] font-medium opacity-90">거짓</span></button>
                  </div>
                  {!basisOk && <p className="mt-2 text-center text-[12px] text-[#FBBF24]">먼저 판단 근거를 작성하세요.</p>}
                </div>
              </section>
            </div>
          </div>
          {modal && <FeedbackModal data={modal} isLast={isLast} onNext={handleNext} />}
        </main>
      );
    }

    /* ===================== 결과 화면 (모둠) ===================== */
    function ResultScreen({ player, summary, onRetry, onHome }) {
      const results = (summary && summary.results) || [];
      const score = summary ? summary.score : RULES.SCORE_MIN;
      const grade = getGrade(score);
      const correctCount = results.filter((r) => r.correct).length;
      const usedTotal = results.reduce((a, r) => a + r.toolkitsUsed, 0);
      const maxToolkits = STAGES.length * 3;
      const usageRate = Math.round((usedTotal / maxToolkits) * 100);
      const displayScore = useCountUp(score, 800);
      const [copied, setCopied] = useState(false);
      const [codeCopied, setCodeCopied] = useState(false);
      const [subState, setSubState] = useState("idle"); // idle|submitting|ok|error|off
      const stageTitleById = useMemo(() => Object.fromEntries(STAGES.map((s) => [s.id, s.title])), []);
      const payload = useMemo(() => summary ? buildGroupPayload(player, summary) : null, [player, summary]);
      const groupCode = useMemo(() => payload ? encodeGroup(payload) : "", [payload]);

      // Firebase 자동 제출(설정된 경우)
      const submit = () => {
        if (!AGG_ENABLED || !payload) { setSubState("off"); return; }
        setSubState("submitting");
        submitGroup(payload).then(() => setSubState("ok")).catch(() => setSubState("error"));
      };
      useEffect(() => { submit(); /* eslint-disable-next-line */ }, []);

      function buildReflectionText() {
        const L = [];
        L.push("디지털 게이트키퍼 — 모둠 활동 기록");
        L.push("모둠: " + (player?.teamName || ""));
        if (player?.members) L.push("모둠원: " + player.members);
        if (player?.members) L.push("조원: " + player.members);
        L.push("최종 점수: " + score + " / 100 · 등급: " + grade.name);
        L.push("정확도: " + correctCount + "/" + STAGES.length + " · 툴킷 활용률: " + usageRate + "%");
        L.push("");
        results.forEach((r) => { L.push("[STAGE " + String(r.id).padStart(2, "0") + "] " + r.title); L.push("판별: " + r.choice + " (정답 " + r.answer + ", " + (r.correct ? "정답" : "오답") + ")"); L.push("판단 근거: " + (r.basis || "(미작성)")); L.push("성찰: " + (r.reflection || "(미작성)")); L.push(""); });
        return L.join("\n");
      }
      function copyText(text, done) { const finish = () => { done(); }; try { if (navigator.clipboard && navigator.clipboard.writeText) { navigator.clipboard.writeText(text).then(finish, () => fallbackCopy(text, finish)); } else fallbackCopy(text, finish); } catch (e) { fallbackCopy(text, finish); } }
      function fallbackCopy(text, done) { try { const ta = document.createElement("textarea"); ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0"; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); done(); } catch (e) { alert("복사 실패. 내용을 직접 선택해 복사하세요."); } }

      const lowUsage = usageRate < 33;
      return (
        <main className="mx-auto max-w-[1100px] px-4 sm:px-6 py-8 sm:py-10 space-y-6">
          <section className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-6 sm:p-8">
            <div className="flex flex-col sm:flex-row sm:items-center gap-6">
              <div className="text-center sm:text-left"><div className="font-mono text-[12px] tracking-widest text-[#8B98A5]">FINAL REPORT</div><div className="mt-1 font-mono text-[56px] sm:text-[64px] font-bold leading-none" style={{ color: grade.color }}>{displayScore}<span className="text-[20px] text-[#8B98A5]"> / 100</span></div></div>
              <div className="flex-1 sm:border-l sm:border-[#1F2A37] sm:pl-6">
                <div className="inline-flex items-center gap-2 rounded-full px-3 py-1.5 mb-2 border" style={{ borderColor: grade.color + "80", background: grade.color + "14", color: grade.color }}><IconTrophy className="w-5 h-5" /><span className="text-[15px] font-bold">{grade.name}</span></div>
                <p className="text-[16px] leading-relaxed text-[#E6EDF3]/90">{grade.comment}</p>
                <p className="mt-1 text-[14px] text-[#8B98A5] inline-flex items-center gap-1.5"><IconUsers className="w-4 h-4" />{player?.teamName} 모둠{player?.members ? " · " + player.members : ""}</p>
              </div>
            </div>
            {/* 제출 상태 */}
            <div className="mt-5 pt-4 border-t border-[#1F2A37] flex items-center gap-3 flex-wrap">
              {AGG_ENABLED ? (
                <>
                  <span className={"inline-flex items-center gap-2 font-mono text-[13px] px-3 py-1.5 rounded-lg border " + (subState === "ok" ? "text-[#34D399] border-[#34D399]/40 bg-[#34D399]/5" : subState === "error" ? "text-[#F87171] border-[#F87171]/40 bg-[#F87171]/5" : "text-[#8B98A5] border-[#1F2A37]")}>
                    <IconSend className="w-4 h-4" />{subState === "submitting" ? "교사 대시보드로 제출 중..." : subState === "ok" ? "제출 완료 · 교사 화면에 표시됨" : subState === "error" ? "제출 실패" : "제출 대기"}
                  </span>
                  {subState === "error" && <button onClick={submit} className="font-mono text-[13px] text-[#22D3EE] hover:underline">다시 제출</button>}
                  <span className="font-mono text-[12px] text-[#8B98A5]">세션: {player?.sessionCode || "default"}</span>
                </>
              ) : (
                <span className="font-mono text-[12px] text-[#8B98A5]">교사 취합: 아래 '모둠 결과 코드'를 복사해 교사에게 전달하세요.</span>
              )}
            </div>
          </section>

          <section aria-label="핵심 요약">
            <h2 className="text-[18px] font-bold text-[#E6EDF3] mb-1">오늘 반드시 기억할 3가지</h2>
            <p className="text-[14px] text-[#8B98A5] mb-4">체험한 스테이지와 연결해 다시 새겨두세요.</p>
            <div className="grid gap-4 md:grid-cols-3">{KEY_LESSONS.map((k) => (<div key={k.no} className="rounded-2xl border border-[#22D3EE]/30 bg-gradient-to-b from-[#22D3EE]/[0.06] to-transparent p-5 flex flex-col"><div className="font-mono text-[34px] font-bold text-[#22D3EE] leading-none">{k.no}</div><h3 className="mt-3 text-[18px] font-bold text-[#E6EDF3] leading-snug">{k.title}</h3><p className="mt-2 text-[15px] leading-relaxed text-[#8B98A5] flex-1">{k.body}</p><div className="mt-4 flex flex-wrap gap-1.5">{k.stages.map((sid) => (<span key={sid} title={stageTitleById[sid]} className="font-mono text-[11px] text-[#22D3EE] border border-[#22D3EE]/30 rounded px-2 py-1">STAGE {String(sid).padStart(2, "0")}</span>))}</div></div>))}</div>
          </section>

          <section className="grid gap-4 lg:grid-cols-[0.9fr_1.1fr] items-start">
            <div className="space-y-4">
              <div className="grid grid-cols-2 gap-4">
                <div className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-5 text-center"><div className="font-mono text-[11px] tracking-wider text-[#8B98A5]">정확도</div><div className="mt-1 font-mono text-[32px] font-bold text-[#34D399]">{correctCount}<span className="text-[16px] text-[#8B98A5]">/{STAGES.length}</span></div></div>
                <div className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-5 text-center"><div className="font-mono text-[11px] tracking-wider text-[#8B98A5]">툴킷 활용률</div><div className={"mt-1 font-mono text-[32px] font-bold " + (lowUsage ? "text-[#F87171]" : usageRate < 67 ? "text-[#FBBF24]" : "text-[#22D3EE]")}>{usageRate}<span className="text-[16px] text-[#8B98A5]">%</span></div><div className="text-[11px] font-mono text-[#8B98A5]">{usedTotal}/{maxToolkits} 사용</div></div>
              </div>
              {lowUsage && (<div className="rounded-2xl border border-[#F87171]/40 bg-[#F87171]/[0.07] p-5" role="alert"><div className="flex items-center gap-2 text-[#F87171] font-bold text-[15px] mb-1.5"><IconAlert className="w-5 h-5" />근거 없이 판단하고 있습니다</div><p className="text-[15px] leading-relaxed text-[#E6EDF3]/90">근거를 확인하지 않고 판단했습니다. 온라인에서 가장 위험한 습관입니다. 점수가 높더라도, 그건 실력이 아니라 운입니다.</p></div>)}
              {/* 모둠 결과 코드(폴백 취합) */}
              <div className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-4">
                <div className="font-mono text-[12px] tracking-wider text-[#8B98A5] mb-2">모둠 결과 코드 (교사 취합용)</div>
                <div className="rounded-lg border border-[#1F2A37] bg-[#0A0E14] px-3 py-2 font-mono text-[11px] text-[#8B98A5] break-all max-h-[64px] overflow-y-auto">{groupCode}</div>
                <button onClick={() => copyText(groupCode, () => { setCodeCopied(true); setTimeout(() => setCodeCopied(false), 2000); })} className="mt-2 w-full inline-flex items-center justify-center gap-2 rounded-lg border border-[#22D3EE]/40 bg-[#22D3EE]/10 px-3 py-2 text-[13px] font-medium text-[#22D3EE] hover:bg-[#22D3EE]/20 transition-colors">{codeCopied ? <IconCheck className="w-4 h-4" /> : <IconCopy className="w-4 h-4" />}{codeCopied ? "복사됨" : "결과 코드 복사"}</button>
              </div>
            </div>
            <div className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-4 sm:p-5">
              <h3 className="text-[15px] font-semibold text-[#E6EDF3] mb-3">스테이지별 결과 · 우리 모둠의 근거</h3>
              <div className="space-y-3">
                {results.map((r) => (
                  <div key={r.id} className="rounded-xl border border-[#1F2A37] bg-[#0A0E14] p-3.5">
                    <div className="flex items-center gap-2 mb-1.5"><span className={r.correct ? "text-[#34D399]" : "text-[#FBBF24]"}>{r.correct ? <IconCheck className="w-4 h-4" /> : <IconAlert className="w-4 h-4" />}</span><span className="text-[13px] font-medium text-[#E6EDF3] flex-1 min-w-0"><span className="font-mono text-[#8B98A5] mr-1">S{r.id}</span>{r.title}</span><span className={"font-mono text-[12px] font-bold " + (r.choice === "REAL" ? "text-[#34D399]" : "text-[#F87171]")}>{r.choice}</span></div>
                    <p className="text-[13px] leading-relaxed text-[#8B98A5]"><span className="text-[#E6EDF3]/70">근거:</span> {r.basis || "(미작성)"}</p>
                  </div>
                ))}
              </div>
            </div>
          </section>

          <section className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-5 sm:p-6">
            <div className="flex items-center justify-between gap-3 flex-wrap mb-3"><div><h3 className="text-[16px] font-semibold text-[#E6EDF3]">모둠 활동 기록 전체</h3><p className="text-[13px] text-[#8B98A5]">근거·성찰을 텍스트로 복사해 학습지·과제에 붙여넣으세요.</p></div><button onClick={() => copyText(buildReflectionText(), () => { setCopied(true); setTimeout(() => setCopied(false), 2000); })} className="inline-flex items-center gap-2 rounded-xl border border-[#22D3EE]/40 bg-[#22D3EE]/10 px-4 py-2.5 text-[14px] font-medium text-[#22D3EE] hover:bg-[#22D3EE]/20 transition-colors">{copied ? <IconCheck className="w-5 h-5" /> : <IconCopy className="w-5 h-5" />}{copied ? "복사되었습니다" : "전체 복사"}</button></div>
          </section>

          <section className="flex flex-col sm:flex-row gap-3">
            <button onClick={onRetry} className="flex-1 inline-flex items-center justify-center gap-2 rounded-xl bg-[#22D3EE] px-5 py-3.5 text-[16px] font-semibold text-[#0A0E14] hover:bg-[#67E8F9] transition-colors"><IconRefresh className="w-5 h-5" />다시 도전</button>
            <button onClick={onHome} className="flex-1 inline-flex items-center justify-center gap-2 rounded-xl border border-[#1F2A37] bg-[#0A0E14] px-5 py-3.5 text-[16px] font-medium text-[#E6EDF3] hover:border-[#22D3EE] transition-colors">처음 화면으로</button>
          </section>
        </main>
      );
    }

    /* ===================== (3) 교사 대시보드 ===================== */
    function TeacherDashboard({ onBack }) {
      const [code, setCode] = useState(DEFAULT_SESSION || "");
      const [connected, setConnected] = useState(false);
      const [fbGroups, setFbGroups] = useState([]);
      const [manual, setManual] = useState([]);
      const [pasteText, setPasteText] = useState("");
      const [connErr, setConnErr] = useState("");
      const [openStage, setOpenStage] = useState(0);
      const [showPw, setShowPw] = useState(false);
      const [showPaste, setShowPaste] = useState(false);
      const [selectedGroup, setSelectedGroup] = useState(null);
      const unsubRef = useRef(null);

      useEffect(() => () => { if (unsubRef.current) unsubRef.current(); }, []);
      // 고정 세션(DEFAULT_SESSION)이 있으면 대시보드 열자마자 자동 접속
      useEffect(() => { if (AGG_ENABLED && DEFAULT_SESSION) connect(); /* eslint-disable-line */ }, []);

      function connect() {
        if (!AGG_ENABLED) return;
        const c = code.trim() || "default"; setConnErr("");
        if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
        ensureFirebase().then((db) => {
          const un = groupsRef(db, c).onSnapshot((snap) => { const arr = []; snap.forEach((d) => arr.push(d.data())); setFbGroups(arr); setConnected(true); }, (err) => { setConnErr("연결 오류: " + (err && err.message ? err.message : err) + " (Firestore 보안 규칙을 확인하세요)"); setConnected(false); });
          unsubRef.current = un;
        }).catch((e) => setConnErr("Firebase 초기화 실패: " + (e && e.message ? e.message : e)));
      }
      function addPasted() {
        const codes = pasteText.split(/\s+/).map((s) => s.trim()).filter((s) => s.indexOf("DGK1:") >= 0 || s.length > 20);
        const parsed = codes.map(decodeGroup).filter(Boolean);
        if (!parsed.length) { alert("유효한 결과 코드를 찾지 못했습니다."); return; }
        setManual((prev) => { const byName = {}; prev.forEach((g) => (byName[g.group] = g)); parsed.forEach((g) => (byName[g.group] = g)); return Object.values(byName); });
        setPasteText("");
      }
      const sessionCode = (code || "").trim() || "default";
      // 개별 모둠 완전 삭제(클라우드 포함)
      function removeGroup(name) {
        if (typeof window !== "undefined" && window.confirm && !window.confirm("'" + name + "' 모둠 결과를 완전히 삭제할까요?\n되돌릴 수 없습니다.")) return;
        setManual((prev) => prev.filter((g) => g.group !== name));
        setFbGroups((prev) => prev.filter((g) => g.group !== name));
        if (selectedGroup === name) setSelectedGroup(null);
        if (AGG_ENABLED) deleteGroupDocById(sessionCode, name).catch(function () {});
      }
      // 전체 완전 삭제(클라우드 포함)
      function removeAll() {
        if (!groups.length) return;
        if (typeof window !== "undefined" && window.confirm && !window.confirm("수합된 모든 모둠 결과를 완전히 삭제할까요?\n되돌릴 수 없습니다.")) return;
        var names = groups.map((g) => g.group);
        setManual([]); setFbGroups([]); setSelectedGroup(null);
        if (AGG_ENABLED) deleteAllGroups(sessionCode, names).catch(function () {});
      }

      // 병합(모둠명 기준, Firebase 우선)
      const groups = useMemo(() => { const byName = {}; manual.forEach((g) => (byName[g.group] = g)); fbGroups.forEach((g) => (byName[g.group] = g)); return Object.values(byName).sort((a, b) => String(a.group).localeCompare(String(b.group), "ko")); }, [manual, fbGroups]);
      const selected = selectedGroup ? groups.find((g) => g.group === selectedGroup) : null;

      return (
        <main className="mx-auto max-w-[1200px] px-4 sm:px-6 py-6 space-y-5">
          <div className="flex items-center justify-between gap-3 flex-wrap">
            <div className="flex items-center gap-3"><button onClick={onBack} className="inline-flex items-center gap-1.5 rounded-lg border border-[#1F2A37] bg-[#0A0E14] px-3 py-2 text-[13px] text-[#8B98A5] hover:border-[#22D3EE] transition-colors"><IconBack className="w-4 h-4" />학생 화면</button><h1 className="text-[20px] font-bold text-[#E6EDF3] inline-flex items-center gap-2"><IconGrid className="w-6 h-6 text-[#22D3EE]" />교사용 대시보드</h1></div>
            <div className="flex items-center gap-3">
              <span className="flex items-center gap-2 font-mono text-[12px] text-[#8B98A5]"><IconUsers className="w-4 h-4" />모둠 {groups.length}팀{connected && <span className="inline-flex items-center gap-1.5 text-[#34D399]"><span className="w-2 h-2 rounded-full bg-[#34D399] live-dot" />실시간</span>}</span>
              <button onClick={() => setShowPw(true)} className="inline-flex items-center gap-1.5 rounded-lg border border-[#1F2A37] bg-[#0A0E14] px-3 py-2 text-[12px] text-[#8B98A5] hover:border-[#22D3EE] transition-colors"><IconLock className="w-4 h-4" />비밀번호 변경</button>
            </div>
          </div>
          {showPw && <ChangePwModal onClose={() => setShowPw(false)} />}

          {/* 접속/취합 컨트롤 (A안: 자동 수합이 기본, 결과 코드는 필요할 때만) */}
          <div className="space-y-4">
            {AGG_ENABLED && (
              <div className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-4 flex items-start justify-between gap-3 flex-wrap">
                <div className="min-w-0">
                  <div className="font-mono text-[12px] tracking-wider text-[#8B98A5] mb-1.5">실시간 자동 수합 (Firebase)</div>
                  <div className="flex items-center gap-3 flex-wrap">
                    <span className={"inline-flex items-center gap-2 text-[14px] " + (connected ? "text-[#34D399]" : "text-[#8B98A5]")}>
                      <span className={"w-2.5 h-2.5 rounded-full " + (connected ? "bg-[#34D399] live-dot" : "bg-[#8B98A5]")} />
                      {connected ? "연결됨 · 학생이 제출하면 자동으로 나타납니다" : "연결 중..."}
                    </span>
                    {!connected && <button onClick={connect} className="rounded-lg border border-[#22D3EE]/40 bg-[#22D3EE]/10 px-3 py-1.5 text-[13px] font-medium text-[#22D3EE] hover:bg-[#22D3EE]/20 transition-colors">다시 연결</button>}
                  </div>
                  {connErr && <p className="mt-2 text-[12px] text-[#F87171] leading-snug">{connErr}</p>}
                </div>
                <button onClick={() => setShowPaste((v) => !v)} className="shrink-0 text-[12px] text-[#8B98A5] hover:text-[#22D3EE] transition-colors underline underline-offset-2">{showPaste ? "결과 코드 입력 닫기" : "결과 코드로 수동 추가"}</button>
              </div>
            )}
            {(showPaste || !!connErr || !AGG_ENABLED) && (
              <div className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-4">
                <div className="font-mono text-[12px] tracking-wider text-[#8B98A5] mb-2">결과 코드 붙여넣기 {AGG_ENABLED ? "(제출 실패한 모둠 수동 추가)" : "(활동 종료 후 수합)"}</div>
                <div className="space-y-2">
                  <textarea value={pasteText} onChange={(e) => setPasteText(e.target.value)} rows={4} placeholder="모둠이 보낸 DGK1:... 코드를 붙여넣기.&#10;여러 모둠이면 줄바꿈으로 나열해 한 번에 추가할 수 있어요." className="w-full rounded-xl border border-[#1F2A37] bg-[#0A0E14] px-3 py-2.5 text-[13px] font-mono text-[#E6EDF3] placeholder:text-[#8B98A5]/60 outline-none focus:border-[#22D3EE] resize-none" />
                  <button onClick={addPasted} className="w-full rounded-xl border border-[#22D3EE]/40 bg-[#22D3EE]/10 px-4 py-2.5 text-[14px] font-medium text-[#22D3EE] hover:bg-[#22D3EE]/20 transition-colors">모둠 추가 (여러 개 가능)</button>
                </div>
              </div>
            )}
          </div>

          {groups.length === 0 ? (
            <div className="rounded-2xl border border-dashed border-[#1F2A37] bg-[#131A24] p-12 text-center text-[#8B98A5]"><IconUsers className="w-10 h-10 mx-auto mb-3 text-[#1F2A37]" /><p className="text-[15px]">아직 제출한 모둠이 없습니다.</p><p className="text-[13px] mt-1">{AGG_ENABLED ? "학생이 활동을 마치면 자동으로 나타납니다." : "모둠 결과 코드를 붙여넣어 추가하세요."}</p></div>
          ) : (
            <>
              {/* 요약 테이블 */}
              <div className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-4 sm:p-5">
                <div className="flex items-start justify-between gap-3 mb-3"><div><h2 className="text-[16px] font-semibold text-[#E6EDF3]">모둠 요약</h2><p className="text-[12px] text-[#8B98A5]">모둠(행)을 클릭하면 그 모둠의 답변만 볼 수 있어요.</p></div><button onClick={removeAll} className="inline-flex items-center gap-1.5 font-mono text-[12px] text-[#8B98A5] hover:text-[#F87171] whitespace-nowrap"><IconTrash className="w-4 h-4" />전체 삭제</button></div>
                <div className="overflow-x-auto"><table className="w-full text-left border-collapse min-w-[640px]">
                  <thead><tr className="font-mono text-[11px] text-[#8B98A5] border-b border-[#1F2A37]"><th className="py-2 pr-2 font-normal">모둠</th><th className="py-2 px-2 font-normal">점수</th><th className="py-2 px-2 font-normal">등급</th><th className="py-2 px-2 font-normal">정확도</th><th className="py-2 px-2 font-normal">툴킷</th><th className="py-2 px-2 font-normal">모둠원</th><th className="py-2 pl-2 font-normal text-right">삭제</th></tr></thead>
                  <tbody>{groups.map((g, i) => { const gr = getGrade(g.score); const usage = Math.round((g.toolkitsUsed / (STAGES.length * 3)) * 100); return (<tr key={i} onClick={() => setSelectedGroup(g.group)} className={"cursor-pointer border-b border-[#1F2A37]/60 last:border-0 transition-colors " + (selectedGroup === g.group ? "bg-[#22D3EE]/10" : "hover:bg-[#0A0E14]")}><td className="py-2.5 pr-2 text-[14px] font-medium text-[#E6EDF3]">{g.group}</td><td className="py-2.5 px-2 font-mono text-[15px] font-bold" style={{ color: gr.color }}>{g.score}</td><td className="py-2.5 px-2 text-[13px]" style={{ color: gr.color }}>{g.grade}</td><td className="py-2.5 px-2 font-mono text-[13px] text-[#34D399]">{g.correctCount}/{STAGES.length}</td><td className={"py-2.5 px-2 font-mono text-[13px] " + (usage < 33 ? "text-[#F87171]" : "text-[#8B98A5]")}>{usage}%</td><td className="py-2.5 px-2 text-[12px] text-[#8B98A5] truncate max-w-[160px]">{g.members || "-"}</td><td className="py-2.5 pl-2 text-right"><button onClick={(e) => { e.stopPropagation(); removeGroup(g.group); }} title="이 모둠 삭제" aria-label={g.group + " 모둠 삭제"} className="inline-flex items-center justify-center w-7 h-7 rounded-lg text-[#8B98A5] hover:text-[#F87171] hover:bg-[#F87171]/10 transition-colors"><IconTrash className="w-4 h-4" /></button></td></tr>); })}</tbody>
                </table></div>
              </div>

              {/* 스테이지별: 모둠 선택 시 그 모둠만, 아니면 전체 비교 */}
              <div className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-4 sm:p-5">
                <div className="flex items-center justify-between gap-3 mb-1">
                  <h2 className="text-[16px] font-semibold text-[#E6EDF3]">{selected ? (selected.group + " 모둠 상세") : "스테이지별 판단 근거 비교"}</h2>
                  {selected && <div className="flex items-center gap-2 shrink-0">
                    <button onClick={() => removeGroup(selected.group)} className="inline-flex items-center gap-1.5 rounded-lg border border-[#F87171]/40 bg-[#F87171]/10 px-3 py-1.5 text-[12px] text-[#F87171] hover:bg-[#F87171]/20 transition-colors"><IconTrash className="w-4 h-4" />이 모둠 삭제</button>
                    <button onClick={() => setSelectedGroup(null)} className="inline-flex items-center gap-1.5 rounded-lg border border-[#1F2A37] bg-[#0A0E14] px-3 py-1.5 text-[12px] text-[#8B98A5] hover:border-[#22D3EE] transition-colors"><IconBack className="w-4 h-4" />전체 비교로</button>
                  </div>}
                </div>
                <p className="text-[13px] text-[#8B98A5] mb-3">{selected ? "이 모둠의 문항별 판별·판단 근거·성찰입니다." : "위 표에서 모둠을 클릭하면 그 모둠만, 선택하지 않으면 모둠끼리 나란히 비교합니다."}</p>

                {selected ? (
                  <div className="space-y-2.5">
                    <div className="flex flex-wrap items-center gap-x-4 gap-y-1 rounded-xl border border-[#1F2A37] bg-[#0A0E14] px-4 py-3 font-mono text-[12px]">
                      <span style={{ color: getGrade(selected.score).color }}>{selected.score}점 · {selected.grade}</span>
                      <span className="text-[#34D399]">정답 {selected.correctCount}/{STAGES.length}</span>
                      <span className="text-[#8B98A5]">툴킷 {Math.round((selected.toolkitsUsed / (STAGES.length * 3)) * 100)}%</span>
                      {selected.members ? <span className="text-[#8B98A5]">모둠원 {selected.members}</span> : null}
                    </div>
                    {STAGES.map((st) => { const s = (selected.stages || []).find((x) => x.id === st.id); return (
                      <div key={st.id} className="rounded-xl border border-[#1F2A37] bg-[#0A0E14] p-3.5">
                        <div className="flex items-center gap-2 mb-1.5">
                          <span className="font-mono text-[12px] text-[#22D3EE]">S{st.id}</span>
                          <span className="flex-1 text-[14px] font-medium text-[#E6EDF3] truncate">{st.title}</span>
                          <span className={"font-mono text-[12px] font-bold " + (st.verdict === "REAL" ? "text-[#34D399]" : "text-[#F87171]")}>정답 {st.verdict}</span>
                          {s ? <span className={"font-mono text-[11px] px-1.5 py-0.5 rounded border " + (s.choice === s.answer ? "text-[#34D399] border-[#34D399]/40" : "text-[#F87171] border-[#F87171]/40")}>{s.choice} {s.choice === s.answer ? "정답" : "오답"}</span> : null}
                        </div>
                        {s ? (<><p className="text-[13px] leading-relaxed text-[#E6EDF3]/90"><span className="text-[#8B98A5]">근거:</span> {s.basis || "(미작성)"}</p>{s.reflection ? <p className="mt-1 text-[12px] leading-relaxed text-[#8B98A5]">성찰: {s.reflection}</p> : null}</>) : <p className="text-[13px] text-[#8B98A5]">이 문항 기록 없음</p>}
                      </div>
                    ); })}
                  </div>
                ) : (
                  <div className="space-y-2.5">
                    {STAGES.map((st, si) => {
                      const open = openStage === si;
                      return (
                        <div key={st.id} className="rounded-xl border border-[#1F2A37] bg-[#0A0E14] overflow-hidden">
                          <button onClick={() => setOpenStage(open ? -1 : si)} className="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-[#131A24] transition-colors">
                            <span className="font-mono text-[12px] text-[#22D3EE]">S{st.id}</span>
                            <span className="flex-1 text-[14px] font-medium text-[#E6EDF3] truncate">{st.title}</span>
                            <span className={"font-mono text-[12px] font-bold " + (st.verdict === "REAL" ? "text-[#34D399]" : "text-[#F87171]")}>정답 {st.verdict}</span>
                            <IconChevron className={"w-5 h-5 text-[#8B98A5] transition-transform " + (open ? "rotate-180" : "")} />
                          </button>
                          {open && (
                            <div className="px-4 pb-4 pt-1 border-t border-[#1F2A37] space-y-2.5">
                              {groups.map((g, gi) => { const s = (g.stages || []).find((x) => x.id === st.id); if (!s) return null; return (
                                <button key={gi} onClick={() => setSelectedGroup(g.group)} className="w-full text-left rounded-lg border border-[#1F2A37] bg-[#131A24] p-3 hover:border-[#22D3EE]/50 transition-colors">
                                  <div className="flex items-center gap-2 mb-1"><span className="text-[13px] font-semibold text-[#E6EDF3]">{g.group}</span><span className={"font-mono text-[11px] px-1.5 py-0.5 rounded border " + (s.choice === s.answer ? "text-[#34D399] border-[#34D399]/40" : "text-[#F87171] border-[#F87171]/40")}>{s.choice} {s.choice === s.answer ? "정답" : "오답"}</span></div>
                                  <p className="text-[13px] leading-relaxed text-[#E6EDF3]/90"><span className="text-[#8B98A5]">근거:</span> {s.basis || "(미작성)"}</p>
                                  {s.reflection ? <p className="mt-1 text-[12px] leading-relaxed text-[#8B98A5]">성찰: {s.reflection}</p> : null}
                                </button>
                              ); })}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </>
          )}
        </main>
      );
    }

    /* ===================== 교사용 비밀번호 게이트 + 변경 ===================== */
    function TeacherGate({ onBack }) {
      const [authed, setAuthed] = useState(false);
      const [pw, setPw] = useState("");
      const [err, setErr] = useState(false);
      function submit(e) { e.preventDefault(); if (pw === getTeacherPw()) { setAuthed(true); setErr(false); } else { setErr(true); setPw(""); } }
      if (authed) return <TeacherDashboard onBack={onBack} />;
      return (
        <main className="mx-auto max-w-[420px] px-4 py-16">
          <div className="rounded-2xl border border-[#1F2A37] bg-[#131A24] p-7 text-center">
            <div className="mx-auto mb-4 w-12 h-12 grid place-items-center rounded-xl border border-[#1F2A37] text-[#22D3EE]"><IconLock className="w-7 h-7" /></div>
            <h1 className="text-[20px] font-bold text-[#E6EDF3]">교사용 접근</h1>
            <p className="mt-1 text-[14px] text-[#8B98A5]">비밀번호를 입력하세요.</p>
            <form className="mt-5 space-y-3" onSubmit={submit}>
              <label htmlFor="tg-pw" className="sr-only">비밀번호</label>
              <input id="tg-pw" type="password" value={pw} onChange={(e) => { setPw(e.target.value); setErr(false); }} autoFocus placeholder="비밀번호" aria-invalid={err}
                className={"w-full rounded-xl border bg-[#0A0E14] px-4 py-3 text-center text-[18px] tracking-[0.3em] text-[#E6EDF3] outline-none transition-colors " + (err ? "border-[#F87171]" : "border-[#1F2A37] focus:border-[#22D3EE]")} />
              {err && <p className="text-[13px] text-[#F87171]" role="alert">비밀번호가 올바르지 않습니다.</p>}
              <button type="submit" className="w-full rounded-xl bg-[#22D3EE] px-5 py-3 text-[15px] font-semibold text-[#0A0E14] hover:bg-[#67E8F9] transition-colors">확인</button>
            </form>
            <div className="mt-4 text-[12px] text-[#8B98A5]">
              <button onClick={onBack} className="hover:text-[#22D3EE]">← 학생 화면</button>
            </div>
          </div>
        </main>
      );
    }
    function ChangePwModal({ onClose }) {
      const [cur, setCur] = useState(""); const [n1, setN1] = useState(""); const [n2, setN2] = useState("");
      const [msg, setMsg] = useState(""); const [ok, setOk] = useState(false);
      useEffect(() => { function k(e) { if (e.key === "Escape") onClose(); } document.addEventListener("keydown", k); return () => document.removeEventListener("keydown", k); }, []);
      function save(e) {
        e.preventDefault();
        if (cur !== getTeacherPw()) { setOk(false); setMsg("현재 비밀번호가 올바르지 않습니다."); return; }
        if (n1.trim().length < 2) { setOk(false); setMsg("새 비밀번호는 2자 이상이어야 합니다."); return; }
        if (n1 !== n2) { setOk(false); setMsg("새 비밀번호가 서로 일치하지 않습니다."); return; }
        setTeacherPw(n1); setOk(true); setMsg("비밀번호가 변경되었습니다."); setTimeout(onClose, 900);
      }
      return (
        <div className="fixed inset-0 z-[85] bg-black/70 backdrop-blur-sm flex items-center justify-center p-4" onClick={onClose}>
          <div className="modal-in w-full max-w-[420px] rounded-2xl border border-[#1F2A37] bg-[#131A24] p-6" role="dialog" aria-modal="true" aria-labelledby="pw-title" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-center gap-2 mb-4"><IconLock className="w-5 h-5 text-[#22D3EE]" /><h2 id="pw-title" className="text-[17px] font-semibold text-[#E6EDF3]">비밀번호 변경</h2></div>
            <form className="space-y-3" onSubmit={save}>
              <input type="password" value={cur} onChange={(e) => setCur(e.target.value)} placeholder="현재 비밀번호" autoFocus className="w-full rounded-xl border border-[#1F2A37] bg-[#0A0E14] px-4 py-2.5 text-[15px] text-[#E6EDF3] outline-none focus:border-[#22D3EE]" />
              <input type="password" value={n1} onChange={(e) => setN1(e.target.value)} placeholder="새 비밀번호 (2자 이상)" className="w-full rounded-xl border border-[#1F2A37] bg-[#0A0E14] px-4 py-2.5 text-[15px] text-[#E6EDF3] outline-none focus:border-[#22D3EE]" />
              <input type="password" value={n2} onChange={(e) => setN2(e.target.value)} placeholder="새 비밀번호 확인" className="w-full rounded-xl border border-[#1F2A37] bg-[#0A0E14] px-4 py-2.5 text-[15px] text-[#E6EDF3] outline-none focus:border-[#22D3EE]" />
              {msg && <p className={"text-[13px] " + (ok ? "text-[#34D399]" : "text-[#F87171]")} role="status">{msg}</p>}
              <div className="flex gap-2 pt-1">
                <button type="submit" className="flex-1 rounded-xl bg-[#22D3EE] px-4 py-2.5 text-[14px] font-semibold text-[#0A0E14] hover:bg-[#67E8F9] transition-colors">저장</button>
                <button type="button" onClick={onClose} className="flex-1 rounded-xl border border-[#1F2A37] bg-[#0A0E14] px-4 py-2.5 text-[14px] font-medium text-[#E6EDF3] hover:border-[#22D3EE] transition-colors">취소</button>
              </div>
            </form>
            <p className="mt-3 text-[11px] text-[#8B98A5]">이 기기(브라우저)에만 저장됩니다. (강력한 보안이 아닌 접근 차단용)</p>
          </div>
        </div>
      );
    }

    /* ===================== 루트 앱 ===================== */
    function App() {
      const initial = (typeof window !== "undefined" && window.location && window.location.hash.replace("#", "") === "teacher") ? "teacher" : "intro";
      const [screen, setScreen] = useState(initial);
      const [visible, setVisible] = useState(true);
      const [player, setPlayer] = useState(null);
      const [summary, setSummary] = useState(null);
      const [runId, setRunId] = useState(0);
      const timerRef = useRef(null);
      const reduceMotion = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      useEffect(() => () => clearTimeout(timerRef.current), []);
      function goTo(next) { if (reduceMotion) { setScreen(next); window.scrollTo(0, 0); return; } setVisible(false); clearTimeout(timerRef.current); timerRef.current = setTimeout(() => { setScreen(next); window.scrollTo(0, 0); requestAnimationFrame(() => requestAnimationFrame(() => setVisible(true))); }, 200); }
      function handleStart(info) { setPlayer(info); setSummary(null); setRunId((n) => n + 1); goTo("playing"); }
      function handleFinish(result) { setSummary(result); goTo("result"); }
      function handleRetry() { setSummary(null); setRunId((n) => n + 1); goTo("playing"); }
      function handleHome() { setPlayer(null); setSummary(null); goTo("intro"); }
      function handleTeacher() { goTo("teacher"); }
      return (
        <div className="min-h-screen flex flex-col font-sans">
          <ConsoleHeader onTeacher={handleTeacher} showTeacher={screen === "intro"} />
          <div className={"flex-1 transition-opacity duration-200 " + (visible ? "opacity-100" : "opacity-0")}>
            {screen === "intro" && <IntroScreen onStart={handleStart} onTeacher={handleTeacher} />}
            {screen === "playing" && <GameScreen key={runId} player={player} onFinish={handleFinish} />}
            {screen === "result" && <ResultScreen player={player} summary={summary} onRetry={handleRetry} onHome={handleHome} />}
            {screen === "teacher" && <TeacherGate onBack={handleHome} />}
          </div>
          <footer className="border-t border-[#1F2A37]"><div className="mx-auto max-w-[1200px] px-4 sm:px-6 py-3 flex items-center justify-between font-mono text-[12px] text-[#8B98A5]"><span>디지털 게이트키퍼 · 교육용 시뮬레이션</span><span className="hidden sm:inline">등장 인물·단체·언론은 모두 가상입니다</span></div></footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<React.Fragment><div className="console-overlay" aria-hidden="true"></div><App /></React.Fragment>);
  </script>

  <script>
    window.addEventListener("load", function () { setTimeout(function () { var loaded = window.React && window.ReactDOM && window.Babel; var root = document.getElementById("root"); if (!loaded || !root || root.children.length === 0) { var fb = document.getElementById("offline-fallback"); if (fb) fb.style.display = "grid"; } }, 1200); });
  </script>
</body>
</html>
